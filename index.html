<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mini Minecraft</title>

<style>
body {
    margin: 0;
    overflow: hidden;
}

#info {
    position: absolute;
    top: 10px;
    width: 100%;
    text-align: center;
    color: white;
    font-family: Arial;
    z-index: 1;
}
</style>
</head>

<body>

<div id="info">
Clique para jogar | WASD = mover | Mouse = olhar
</div>

<script type="module">

import * as THREE from 'https://unpkg.com/three@0.152.2/build/three.module.js';

import { PointerLockControls } from 'https://unpkg.com/three@0.152.2/examples/jsm/controls/PointerLockControls.js?module';

// ===== CENA =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// ===== CAMERA =====
const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);
camera.position.y = 2;

// ===== RENDER =====
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ===== CONTROLES =====
const controls = new PointerLockControls(camera, document.body);
scene.add(controls.getObject());

document.body.addEventListener("click", () => {
    controls.lock();
});

// ===== LUZ =====
const light = new THREE.HemisphereLight(0xffffff, 0x444444);
scene.add(light);

// ===== CHÃO =====
const floorGeometry = new THREE.PlaneGeometry(100, 100);
const floorMaterial = new THREE.MeshBasicMaterial({ color: 0x228B22 });
const floor = new THREE.Mesh(floorGeometry, floorMaterial);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

// ===== BLOCO =====
const cubeGeometry = new THREE.BoxGeometry(1, 1, 1);
const cubeMaterial = new THREE.MeshBasicMaterial({ color: 0x8B4513 });
const cube = new THREE.Mesh(cubeGeometry, cubeMaterial);
cube.position.set(0, 0.5, -5);
scene.add(cube);

// ===== MOVIMENTO =====
const keys = {};

document.addEventListener("keydown", (event) => {
    keys[event.key.toLowerCase()] = true;
});

document.addEventListener("keyup", (event) => {
    keys[event.key.toLowerCase()] = false;
});

const speed = 0.1;

// ===== LOOP =====
function animate() {
    requestAnimationFrame(animate);

    if (controls.isLocked) {
        if (keys["w"]) controls.moveForward(speed);
        if (keys["s"]) controls.moveForward(-speed);
        if (keys["a"]) controls.moveRight(-speed);
        if (keys["d"]) controls.moveRight(speed);
    }

    renderer.render(scene, camera);
}

animate();

// ===== AJUSTE DE TELA =====
window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
