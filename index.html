<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Minecraft Web</title>

<link rel="icon" href="data:,">

<style>
body { margin: 0; overflow: hidden; }

#info {
    position: absolute;
    top: 10px;
    width: 100%;
    text-align: center;
    color: white;
    font-family: Arial;
}

#inventory {
    position: absolute;
    bottom: 10px;
    width: 100%;
    text-align: center;
    color: white;
    font-family: Arial;
}
</style>
</head>

<body>

<div id="info">
Clique para jogar | WASD mover | Mouse olhar | Espaço pular | Esq = quebrar | Dir = construir | 1-5 trocar bloco
</div>

<div id="inventory">Bloco atual: 1</div>

<script type="module">

import * as THREE from 'https://esm.sh/three@0.152.2?bundle';
import { PointerLockControls } from 'https://esm.sh/three@0.152.2/examples/jsm/controls/PointerLockControls.js?deps=three@0.152.2';

// ===== CENA =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// ===== CAMERA =====
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.y = 2;

// ===== RENDER =====
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ===== CONTROLES =====
const controls = new PointerLockControls(camera, document.body);
scene.add(controls.getObject());

document.body.addEventListener("click", () => controls.lock());

// ===== LUZ =====
const light = new THREE.HemisphereLight(0xffffff, 0x444444);
scene.add(light);

// ===== CHÃO =====
const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(200, 200),
    new THREE.MeshBasicMaterial({ color: 0x228B22 })
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

// ===== MATERIAIS (INVENTÁRIO) =====
const materials = {
    1: new THREE.MeshBasicMaterial({ color: 0x8B4513 }), // terra
    2: new THREE.MeshBasicMaterial({ color: 0x00ff00 }), // grama
    3: new THREE.MeshBasicMaterial({ color: 0x888888 }), // pedra
    4: new THREE.MeshBasicMaterial({ color: 0xffff00 }), // ouro
    5: new THREE.MeshBasicMaterial({ color: 0x0000ff })  // água
};

let currentBlock = 1;

// ===== UI =====
function updateUI(){
    document.getElementById("inventory").innerText = "Bloco atual: " + currentBlock;
}

// ===== BLOCOS =====
const blocks = [];
const geometry = new THREE.BoxGeometry(1,1,1);

// CRIAR MUNDO
for(let x=-10; x<10; x++){
    for(let z=-10; z<10; z++){
        const block = new THREE.Mesh(geometry, materials[1]);
        block.position.set(x, 0.5, z);
        scene.add(block);
        blocks.push(block);
    }
}

// ===== MOVIMENTO =====
const keys = {};
let velocityY = 0;
let canJump = false;

document.addEventListener("keydown", (e)=>{

    keys[e.key.toLowerCase()] = true;

    // INVENTÁRIO
    const key = parseInt(e.key);
    if(key >= 1 && key <= 5){
        currentBlock = key;
        updateUI();
    }

    // PULO
    if(e.code === "Space" && canJump){
        velocityY = 0.2;
        canJump = false;
    }
});

document.addEventListener("keyup", (e)=>{
    keys[e.key.toLowerCase()] = false;
});

const speed = 0.1;

// ===== RAYCAST =====
const raycaster = new THREE.Raycaster();

window.addEventListener("mousedown", (event)=>{

    if(!controls.isLocked) return;

    raycaster.setFromCamera({x:0, y:0}, camera);
    const intersects = raycaster.intersectObjects(blocks);

    if(intersects.length > 0){

        const hit = intersects[0];

        // QUEBRAR
        if(event.button === 0){
            scene.remove(hit.object);
            blocks.splice(blocks.indexOf(hit.object),1);
        }

        // CONSTRUIR
        if(event.button === 2){
            const newBlock = new THREE.Mesh(geometry, materials[currentBlock]);
            newBlock.position.copy(hit.object.position).add(hit.face.normal);
            scene.add(newBlock);
            blocks.push(newBlock);
        }
    }
});

// DESATIVA MENU DIREITO
window.addEventListener("contextmenu", e => e.preventDefault());

// ===== LOOP =====
function animate(){
    requestAnimationFrame(animate);

    if(controls.isLocked){

        if(keys["w"]) controls.moveForward(speed);
        if(keys["s"]) controls.moveForward(-speed);
        if(keys["a"]) controls.moveRight(-speed);
        if(keys["d"]) controls.moveRight(speed);

        // GRAVIDADE
        velocityY -= 0.01;
        camera.position.y += velocityY;

        if(camera.position.y < 2){
            camera.position.y = 2;
            velocityY = 0;
            canJump = true;
        }
    }

    renderer.render(scene, camera);
}

animate();

// ===== RESIZE =====
window.addEventListener("resize", ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
