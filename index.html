<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Minecraft Web</title>

<style>
body { margin: 0; overflow: hidden; }
#info {
    position: absolute;
    top: 10px;
    width: 100%;
    text-align: center;
    color: white;
    font-family: Arial;
    z-index: 1;
}
</style>
</head>

<body>

<div id="info">
Clique para jogar | WASD mover | Mouse olhar | Clique esquerdo = quebrar | Direito = construir | Espaço = pular
</div>

<script type="module">

import * as THREE from 'https://esm.sh/three@0.152.2?bundle';

import { PointerLockControls } from 'https://esm.sh/three@0.152.2/examples/jsm/controls/PointerLockControls.js?deps=three@0.152.2';

// CENA
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// CAMERA
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.y = 2;

// RENDER
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// CONTROLES
const controls = new PointerLockControls(camera, document.body);
scene.add(controls.getObject());

document.body.addEventListener("click", () => controls.lock());

// LUZ
const light = new THREE.HemisphereLight(0xffffff, 0x444444);
scene.add(light);

// CHÃO BASE
const floorGeometry = new THREE.PlaneGeometry(200, 200);
const floorMaterial = new THREE.MeshBasicMaterial({ color: 0x228B22 });
const floor = new THREE.Mesh(floorGeometry, floorMaterial);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

// BLOCOS
const blocks = [];
const blockSize = 1;

const geometry = new THREE.BoxGeometry(1,1,1);
const material = new THREE.MeshBasicMaterial({ color: 0x8B4513 });

// CRIAR MUNDO
for(let x=-10; x<10; x++){
    for(let z=-10; z<10; z++){
        const block = new THREE.Mesh(geometry, material);
        block.position.set(x, 0.5, z);
        scene.add(block);
        blocks.push(block);
    }
}

// MOVIMENTO
const keys = {};
let velocityY = 0;
let canJump = false;

document.addEventListener("keydown", (e)=>{
    keys[e.key.toLowerCase()] = true;

    if(e.code === "Space" && canJump){
        velocityY = 0.2;
        canJump = false;
    }
});

document.addEventListener("keyup", (e)=>{
    keys[e.key.toLowerCase()] = false;
});

const speed = 0.1;

// RAYCAST (quebrar e construir)
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener("mousedown", (event)=>{

    if(!controls.isLocked) return;

    raycaster.setFromCamera({x:0, y:0}, camera);
    const intersects = raycaster.intersectObjects(blocks);

    if(intersects.length > 0){
        const hit = intersects[0];

        // QUEBRAR
        if(event.button === 0){
            scene.remove(hit.object);
            blocks.splice(blocks.indexOf(hit.object),1);
        }

        // CONSTRUIR
        if(event.button === 2){
            const newBlock = new THREE.Mesh(geometry, material);
            newBlock.position.copy(hit.object.position).add(hit.face.normal);
            scene.add(newBlock);
            blocks.push(newBlock);
        }
    }
});

// DESATIVAR MENU DIREITO
window.addEventListener("contextmenu", e => e.preventDefault());

// LOOP
function animate(){
    requestAnimationFrame(animate);

    if(controls.isLocked){

        if(keys["w"]) controls.moveForward(speed);
        if(keys["s"]) controls.moveForward(-speed);
        if(keys["a"]) controls.moveRight(-speed);
        if(keys["d"]) controls.moveRight(speed);

        // GRAVIDADE + PULO
        velocityY -= 0.01;
        camera.position.y += velocityY;

        if(camera.position.y < 2){
            camera.position.y = 2;
            velocityY = 0;
            canJump = true;
        }
    }

    renderer.render(scene, camera);
}

animate();

// RESIZE
window.addEventListener("resize", ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
